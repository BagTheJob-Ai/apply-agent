name: Publish

# Publishes @bagthejobai/apply-agent to npm when a GitHub Release tagged `v<semver>`
# is published (e.g. v1.23.1). The job refuses to publish unless the release tag
# matches package.json, and the package MAJOR version matches the BUNDLED skill's
# Template version (APPLICATION_AGENT.md shipped in the package) — the package
# tracks the skill's major release line (BagTheJob issue #217), so a cross-major
# drift or mis-tag fails loudly instead of shipping, while the package minor may
# advance independently of the skill minor. It also re-checks the
# skill.lock release gate (version + content hash) at publish time, so a skill
# edited without regenerating skill.lock can never be released.
on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    if: startsWith(github.event.release.tag_name, 'v')
    env:
      TAG_NAME: ${{ github.event.release.tag_name }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Verify tag == package version, and major tracks the bundled skill
        run: |
          set -euo pipefail
          TAG_VER="${TAG_NAME#v}"
          PKG_VER="$(node -p "require('./package.json').version")"
          SKILL_VER="$(grep -m1 -oE '\*\*Template version:\*\* `v[0-9]+\.[0-9]+\.[0-9]+`' APPLICATION_AGENT.md | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')"
          echo "tag=$TAG_VER  package.json=$PKG_VER  bundled-skill=$SKILL_VER"
          if [ -z "$SKILL_VER" ]; then
            echo "::error::Could not parse the Template version from the bundled APPLICATION_AGENT.md" >&2
            exit 1
          fi
          if [ "$TAG_VER" != "$PKG_VER" ]; then
            echo "::error::Release tag version ($TAG_VER) != package.json version ($PKG_VER)" >&2
            exit 1
          fi
          TAG_MAJOR="${TAG_VER%%.*}"; SKILL_MAJOR="${SKILL_VER%%.*}"
          if [ "$TAG_MAJOR" != "$SKILL_MAJOR" ]; then
            echo "::error::package major ($TAG_MAJOR) != bundled skill major ($SKILL_MAJOR). The package must track the skill's major release line." >&2
            exit 1
          fi

      - name: Verify skill.lock matches APPLICATION_AGENT.md (release gate)
        run: |
          set -euo pipefail
          LOCK_VER="$(node -p "JSON.parse(require('fs').readFileSync('./skill.lock', 'utf8')).version")"
          LOCK_SHA="$(node -p "JSON.parse(require('fs').readFileSync('./skill.lock', 'utf8')).sha256")"
          SKILL_VER="$(grep -m1 -oE '\*\*Template version:\*\* `v[0-9]+\.[0-9]+\.[0-9]+`' APPLICATION_AGENT.md | grep -oE 'v[0-9]+\.[0-9]+\.[0-9]+')"
          SKILL_SHA="$(shasum -a 256 APPLICATION_AGENT.md | awk '{print $1}')"
          echo "lock=$LOCK_VER/$LOCK_SHA  skill=$SKILL_VER/$SKILL_SHA"
          if [ "$LOCK_VER" != "$SKILL_VER" ] || [ "$LOCK_SHA" != "$SKILL_SHA" ]; then
            echo "::error::skill.lock ($LOCK_VER / $LOCK_SHA) does not match APPLICATION_AGENT.md ($SKILL_VER / $SKILL_SHA) — the skill changed without regenerating skill.lock." >&2
            exit 1
          fi
          LEDGER_SHA="$(node -p "require('./skill-versions.json')['$SKILL_VER'] || ''")"
          if [ "$LEDGER_SHA" != "$SKILL_SHA" ]; then
            echo "::error::skill-versions.json has no matching entry for $SKILL_VER ($SKILL_SHA) — record the released version in the ledger." >&2
            exit 1
          fi

      - name: Smoke-test the CLI entrypoint
        run: |
          set -euo pipefail
          OUT="$(node bin/apply-agent.js --version)"
          echo "apply-agent --version -> $OUT"
          test "$OUT" = "${TAG_NAME#v}"

      - name: Publish
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
